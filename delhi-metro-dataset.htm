    <script nonce="rQ/AuTH6YnSOx8CAUyQsHQ==" type="application/ld+json">{"@context":"http://schema.org/","@type":"Dataset","name":"Delhi Metro Dataset-  EDA &amp;  Data Visualization","description":"\n📊 Delhi Metro Ridership &amp; Operational Statistics Dataset\n\n---\n\n##  **Subtitle**\n\nA comprehensive dataset representing ridership, ticket revenue, and operational performance of the Delhi Metro one of the largest urban transit systems in the world.\n\n---\n\n##  **About the Dataset**\n\nThe **Delhi Metro** is a rapid transit system serving the National Capital Region (NCR) of India. It plays a crucial role in reducing traffic congestion and providing sustainable public transportation to millions of passengers every day.\n\nThis dataset captures multiple performance indicators of the Delhi Metro network over time, including:\n\n **Total metro trips operated**\n **Daily total passengers**\n **Ticket revenue**\n **Average passenger distance traveled per trip**\n **Top stations based on passenger demand**\n **Total stations operational**\n\nThese data points help in analyzing metro usage patterns, operational efficiency, and transit demand in the region.\n\n---\n\n##  **Why This Dataset is Useful**\n\nThis dataset enables research in:\n\n Urban transport planning\n Revenue &amp; demand forecasting\n Passenger travel behavior analysis\n Transportation infrastructure optimization\n Dashboard development &amp; data storytelling\n Academic machine learning projects\n\n---\n\n##  **Potential Use Cases**\n\n* **Time-series forecasting** of passengers and revenue\n* **Peak-hour identification** using station-based data\n* **Policy evaluation** on fare changes and new lines\n* **Visualization dashboards** (e.g., Plotly/Dash, Power BI, Tableau)\n\n---\n\n##  **Source**\n\nData has been collected, cleaned, and aggregated using publicly available metro operational insights, news reports, and transit performance summaries released by the Delhi Metro Rail Corporation (DMRC).\n\n---\n\n##  **File Details**\n\n| Field                      | Description                                     |\n| -------------------------- | ----------------------------------------------- |\n| `Date`                     | Date of operation                               |\n| `Total_Trips`              | Number of train trips operated on that day      |\n| `Total_Passengers`         | Total ridership for that day                    |\n| `Total_Revenue`            | Ticketing revenue (₹ INR)                       |\n| `Avg_Fare`                 | Revenue divided by passengers                   |\n| `Avg_Distance`             | Estimated average travel distance per passenger |\n| `Passengers_per_Trip`      | Ridership divided by number of trips            |\n| `Revenue_Ticket`           | Ticket revenue per trip                         |\n| `Ticket_Type` *(optional)* | Type of ticket or trip category                 |\n| `Top_Stations`             | Highest-demand stations on that day             |\n\n*(Adjust fields based on your actual dataset columns — I can refine if you share final structure.)*\n\n---\n\n## **Licensing**\n\n License: **CC BY 4.0**\n(Users must provide attribution when using the dataset)\n\n---\n\nIf you want, I can also add:\n\n Thumbnail Image for Kaggle Dataset\n Tags &amp; Categories for better discoverability\n Example Notebooks (Exploration + Forecast models)\n Dashboard Preview Screenshots\n\n","url":"https://www.kaggle.com/nikhilkumar766/delhi-metro-dataset","version":1,"keywords":["technique, data visualization","technique, exploratory data analysis","packages, pandas","packages, matplotlib","packages, seaborn"],"license":{"@type":"CreativeWork","name":"CC0: Public Domain","url":"https://creativecommons.org/publicdomain/zero/1.0/"},"identifier":["8665882"],"includedInDataCatalog":{"@type":"DataCatalog","name":"Kaggle","url":"https://www.kaggle.com"},"creator":{"@type":"Person","name":"Nikhil Kumar Mishra","url":"https://www.kaggle.com/
